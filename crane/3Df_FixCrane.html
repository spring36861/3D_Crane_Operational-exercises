<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D 起重機吊掛練習器</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        #canvas-container { width: 100%; height: 100vh; display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        canvas { touch-action: none; }
        .noselect { user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }

        #compass-container {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            display: flex; gap: 20px; align-items: flex-start;
            pointer-events: none;
        }
        #compass {
            width: 90px; height: 90px;
            background: rgba(20, 25, 40, 0.4);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            position: relative;
            backdrop-filter: blur(2px);
        }
        .cp-label { position: absolute; font-weight: 900; font-size: 14px; text-shadow: 0 1px 3px black; }
        .cp-n { top: 5px; left: 50%; transform: translateX(-50%); color: #ef4444; }
        .cp-s { bottom: 5px; left: 50%; transform: translateX(-50%); color: #fff; }
        .cp-e { right: 8px; top: 50%; transform: translateY(-50%); color: #fff; }
        .cp-w { left: 8px; top: 50%; transform: translateY(-50%); color: #fff; }
        .cp-cross-v { position: absolute; top: 15%; bottom: 15%; left: 50%; width: 1px; background: rgba(255,255,255,0.2); transform: translateX(-50%); }
        .cp-cross-h { position: absolute; left: 15%; right: 15%; top: 50%; height: 1px; background: rgba(255,255,255,0.2); transform: translateY(-50%); }
        .cp-center { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: white; border-radius: 50%; transform: translate(-50%, -50%); }

        #rc-container {
            position: absolute; bottom: 20px; right: 20px; z-index: 10;
            transform-origin: bottom right;
            transform: scale(0.9);
        }
        .rc-body {
            background-color: rgba(234, 88, 12, 0.65);
            width: 130px;
            border-radius: 16px;
            padding: 15px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3), inset 2px 2px 5px rgba(255,255,255,0.2), inset -2px -2px 5px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; gap: 12px;
            border: 1px solid rgba(194, 65, 12, 0.5);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .rc-top-slot { width: 60%; height: 6px; background: rgba(0,0,0,0.2); margin: 0 auto 5px auto; border-radius: 3px; }
        .rc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 10px; padding: 0 5px; }
        .btn-slot-empty { height: 45px; border-radius: 8px; background: rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.15); box-shadow: inset 1px 1px 3px rgba(0,0,0,0.1); }
        .btn-black {
            height: 45px;
            background: radial-gradient(circle at 35% 30%, rgba(63, 63, 70, 0.9), rgba(24, 24, 27, 0.95));
            border-radius: 10px; border: 1px solid rgba(0,0,0,0.5);
            color: white; font-weight: bold; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 5px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.2);
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: transform 0.05s, box-shadow 0.05s; position: relative;
        }
        .btn-black:active, .btn-black.active {
            transform: translateY(2px);
            box-shadow: 0 1px 1px rgba(0,0,0,0.3), inset 0 2px 5px rgba(0,0,0,0.6);
            color: #fbbf24;
        }
        .rc-label { font-size: 9px; font-weight: 800; color: #1f2937; text-align: center; margin-bottom: 2px; text-transform: uppercase; text-shadow: 0 0 2px rgba(255,255,255,0.3); }
        .rc-footer { margin-top: 5px; text-align: center; font-size: 8px; font-weight: 800; color: rgba(0,0,0,0.4); }

        #collision-flash {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            border: 0px solid #ef4444; pointer-events: none; z-index: 5;
            transition: border-width 0.1s;
        }
        #reset-btn {
            position: absolute; bottom: 20px; left: 20px; z-index: 20;
            background: rgba(55, 65, 81, 0.6); border: 1px solid rgba(75, 85, 99, 0.5);
            backdrop-filter: blur(4px); color: #e5e7eb; padding: 6px 12px; border-radius: 6px; font-size: 12px;
            cursor: pointer; transition: background 0.2s;
        }
        #reset-btn:hover { background: rgba(55, 65, 81, 0.9); }
    </style>
</head>
<body class="noselect">

    <div id="canvas-container"></div>
    <div id="collision-flash"></div>

    <div id="compass-container">
        <div id="compass">
            <div class="cp-cross-v"></div>
            <div class="cp-cross-h"></div>
            <div class="cp-label cp-n">北</div>
            <div class="cp-label cp-s">南</div>
            <div class="cp-label cp-e">東</div>
            <div class="cp-label cp-w">西</div>
            <div class="cp-center"></div>
        </div>
    </div>

    <div id="rc-container">
        <div class="rc-body">
            <div class="rc-top-slot"></div>
            <div class="rc-grid">
                <div><div class="btn-slot-empty"></div></div>
                <div>
                    <div class="rc-label">UP</div>
                    <div id="btn-up" class="btn-black" data-action="up">上</div>
                </div>
                <div><div class="btn-slot-empty"></div></div>
                <div>
                    <div class="rc-label">DOWN</div>
                    <div id="btn-down" class="btn-black" data-action="down">下</div>
                </div>
            </div>
            <div style="height:1px; background:rgba(0,0,0,0.1); margin: 5px 0;"></div>
            <div class="rc-grid">
                <div>
                    <div class="rc-label">SOUTH</div>
                    <div id="btn-south" class="btn-black" data-action="south">南</div>
                </div>
                <div>
                    <div class="rc-label">EAST</div>
                    <div id="btn-east" class="btn-black" data-action="east">東</div>
                </div>
                <div>
                    <div class="rc-label">NORTH</div>
                    <div id="btn-north" class="btn-black" data-action="north">北</div>
                </div>
                <div>
                    <div class="rc-label">WEST</div>
                    <div id="btn-west" class="btn-black" data-action="west">西</div>
                </div>
            </div>
            <div class="rc-footer">CRANE CONTROLLER</div>
        </div>
    </div>

    <button id="reset-btn" onclick="resetGame()">重置位置</button>

    <script>
        // === 速度設定 ===
        const SPEED_MULTIPLIER = 6.0;
        const REAL_SPEEDS = {
            bridge: (21.0 / 60.0) * SPEED_MULTIPLIER,
            trolley: (14.5 / 60.0) * SPEED_MULTIPLIER,
            hoist: (4.8 / 60.0) * SPEED_MULTIPLIER * 2
        };

        const state = {
            move: { north: false, south: false, east: false, west: false, up: false, down: false },
            velocity: { bridge: 0, trolley: 0, hoist: 0 },
            physics: {
                accel: { bridge: REAL_SPEEDS.bridge * 0.8, trolley: REAL_SPEEDS.trolley * 0.8, hoist: REAL_SPEEDS.hoist * 50 },
                decel: { bridge: 1.2, trolley: 1.2, hoist: 1.0 }
            },
            limits: { x: 44, z: 40, minL: 1, maxL: 27 },
            bridgeY: 25, bridgeZ: 0, trolleyX: -26, cableLength: 0, collisions: 0
        };

        const GRAVITY_FORCE = 60.0;
        const DAMPING = 0.9995;
        const clock = new THREE.Clock();
        const gravity = new THREE.Vector3(0, -GRAVITY_FORCE, 0);
        let payloadPos = new THREE.Vector3();
        let payloadPrevPos = new THREE.Vector3();
        const obstacles = [];
        const collisionFlash = document.getElementById('collision-flash');

        // === Three.js 初始化 ===
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        // 漸層天空
        const skyCanvas = document.createElement('canvas');
        skyCanvas.width = 2; skyCanvas.height = 256;
        const skyCtx = skyCanvas.getContext('2d');
        const skyGrad = skyCtx.createLinearGradient(0, 0, 0, 256);
        skyGrad.addColorStop(0, '#87CEEB');
        skyGrad.addColorStop(0.4, '#B0D4E8');
        skyGrad.addColorStop(0.7, '#D4E4ED');
        skyGrad.addColorStop(1.0, '#E8ECF0');
        skyCtx.fillStyle = skyGrad;
        skyCtx.fillRect(0, 0, 2, 256);
        const skyTex = new THREE.CanvasTexture(skyCanvas);
        scene.background = skyTex;
        scene.fog = new THREE.FogExp2('#D4E4ED', 0.008);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // === 光影系統 ===
        const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambLight);
        const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556B2F, 0.5);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xFFF5E0, 1.0);
        dirLight.position.set(50, 80, 30);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(2048, 2048);
        dirLight.shadow.camera.left = -70; dirLight.shadow.camera.right = 70;
        dirLight.shadow.camera.top = 70; dirLight.shadow.camera.bottom = -70;
        dirLight.shadow.camera.near = 10; dirLight.shadow.camera.far = 200;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);
        const fillLight = new THREE.DirectionalLight(0x8EC8F0, 0.3);
        fillLight.position.set(-40, 30, -50);
        scene.add(fillLight);

        // === 材質庫 ===
        function createStripeTex(c1, c2, count) {
            const cv = document.createElement('canvas');
            cv.width = count * 20; cv.height = 20;
            const ctx = cv.getContext('2d');
            for (let i = 0; i < count; i++) {
                ctx.fillStyle = i % 2 === 0 ? c1 : c2;
                ctx.fillRect(i * 20, 0, 20, 20);
            }
            const tex = new THREE.CanvasTexture(cv);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            return tex;
        }

        const warningTex = createStripeTex('#F59E0B', '#1F2937', 20);
        warningTex.repeat.set(8, 1);

        const matYellow = new THREE.MeshStandardMaterial({ color: '#E8A817', metalness: 0.3, roughness: 0.5 });
        const matYellowBright = new THREE.MeshStandardMaterial({ color: '#FBBF24', metalness: 0.2, roughness: 0.4 });
        const matDarkSteel = new THREE.MeshStandardMaterial({ color: '#2D3748', metalness: 0.7, roughness: 0.3 });
        const matLightSteel = new THREE.MeshStandardMaterial({ color: '#718096', metalness: 0.6, roughness: 0.35 });
        const matRail = new THREE.MeshStandardMaterial({ color: '#4A5568', metalness: 0.8, roughness: 0.25 });
        const matWarning = new THREE.MeshStandardMaterial({ map: warningTex, metalness: 0.2, roughness: 0.5 });
        const matRed = new THREE.MeshStandardMaterial({ color: '#DC2626', metalness: 0.3, roughness: 0.4 });
        const matBlue = new THREE.MeshStandardMaterial({ color: '#2563EB', metalness: 0.4, roughness: 0.3 });
        const matCable = new THREE.MeshStandardMaterial({ color: '#1A1A2E', metalness: 0.9, roughness: 0.2 });
        const matOrange = new THREE.MeshStandardMaterial({ color: '#EA580C', metalness: 0.3, roughness: 0.4 });
        const matConcrete = new THREE.MeshStandardMaterial({ color: '#D1D5DB', roughness: 0.9, metalness: 0.0 });

        // === 地板 ===
        const floorTex = (() => {
            const cv = document.createElement('canvas');
            cv.width = 512; cv.height = 512;
            const ctx = cv.getContext('2d');
            ctx.fillStyle = '#C8CCD0';
            ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = '#B0B4B8';
            ctx.lineWidth = 2;
            for (let i = 0; i <= 8; i++) {
                ctx.beginPath(); ctx.moveTo(i * 64, 0); ctx.lineTo(i * 64, 512); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * 64); ctx.lineTo(512, i * 64); ctx.stroke();
            }
            const t = new THREE.CanvasTexture(cv);
            t.wrapS = THREE.RepeatWrapping; t.wrapT = THREE.RepeatWrapping;
            t.repeat.set(15, 15);
            return t;
        })();
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.85, metalness: 0.0 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // === 投影標記 ===
        const shadowMarkerGeo = new THREE.RingGeometry(0.1, 0.8, 32);
        const shadowMarkerMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
        const shadowMarker = new THREE.Mesh(shadowMarkerGeo, shadowMarkerMat);
        shadowMarker.rotation.x = -Math.PI / 2;
        shadowMarker.position.y = 0.02;
        scene.add(shadowMarker);

        // === 結構常數 ===
        // bridgeY(25) = 柱頂高度 = 軌道樑中心高度
        // 軌道面 (rail top) = bridgeY + 1 (軌道樑上翼板+軌道頭)
        const COL_H = state.bridgeY;      // 柱高 25
        const RUNWAY_Y = COL_H;           // 軌道樑中心 25
        const RAIL_SURFACE = COL_H + 1;   // 軌面 26 (端樑輪子踩這裡)
        const GIRDER_H = 2.5;             // 箱型樑高度
        const GIRDER_W = 1.8;             // 箱型樑寬
        const GIRDER_SPAN = 96;           // 樑跨距 (柱間距100，內縮避穿模)
        const GIRDER_SPACING = 5;         // 雙樑中心間距
        const END_TRUCK_H = 1.8;          // 端樑總高
        // bridgeGroup 座標系: local y=0 = 端樑輪底 = 世界 RAIL_SURFACE
        // 端樑: y=0.2 ~ END_TRUCK_H
        // 樑底: y=END_TRUCK_H, 樑頂: y=END_TRUCK_H+GIRDER_H
        const GIRDER_BOT = END_TRUCK_H;              // 樑底 local y
        const GIRDER_TOP = END_TRUCK_H + GIRDER_H;   // 樑頂 local y
        const PIVOT_WORLD_Y = RAIL_SURFACE + GIRDER_BOT; // 鋼索出口世界 y = 27.8

        // === H型鋼立柱 ===
        function createHBeamColumn(height, x, z) {
            const flangeW = 1.4;
            const flangeT = 0.18;
            const webT = 0.14;
            const web = new THREE.Mesh(new THREE.BoxGeometry(webT, height, flangeW), matDarkSteel);
            web.position.set(x, height / 2, z); web.castShadow = true; scene.add(web);
            [-1, 1].forEach(s => {
                const f = new THREE.Mesh(new THREE.BoxGeometry(flangeW, height, flangeT), matDarkSteel);
                f.position.set(x, height / 2, z + s * (flangeW / 2)); f.castShadow = true; scene.add(f);
            });
            const base = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.35, 2.5), matDarkSteel);
            base.position.set(x, 0.175, z); base.receiveShadow = true; scene.add(base);
            [1, height - 1].forEach(y => {
                const rib = new THREE.Mesh(new THREE.BoxGeometry(flangeW, 0.12, flangeW), matLightSteel);
                rib.position.set(x, y, z); scene.add(rib);
            });
        }

        // === 軌道樑 (工字鋼 + 軌道頭) ===
        function createRunwayBeam(length, x) {
            const y = RUNWAY_Y;
            const web = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, length), matRail);
            web.position.set(x, y, 0); web.castShadow = true; scene.add(web);
            const topF = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.2, length), matRail);
            topF.position.set(x, y + 0.8, 0); scene.add(topF);
            const botF = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.2, length), matRail);
            botF.position.set(x, y - 0.8, 0); scene.add(botF);
            const rail = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, length), matLightSteel);
            rail.position.set(x, y + 1.0, 0); scene.add(rail);
        }

        // === 建造廠房 ===
        const colZ = [-45, -30, -15, 0, 15, 30, 45];
        colZ.forEach(z => { createHBeamColumn(COL_H, -50, z); createHBeamColumn(COL_H, 50, z); });

        // 柱間繫梁 + 斜撐 (正確連接柱頂到柱頂)
        colZ.forEach((z, i) => {
            if (i >= colZ.length - 1) return;
            const nz = colZ[i + 1];
            const mid = (z + nz) / 2;
            const span = nz - z;
            const braceH = 6;
            [-50, 50].forEach(rx => {
                // 上繫梁
                const tb = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.12, span), matLightSteel);
                tb.position.set(rx, COL_H - braceH, mid); scene.add(tb);
                // 下繫梁
                const bb = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.12, span), matLightSteel);
                bb.position.set(rx, COL_H, mid); scene.add(bb);
                // X 斜撐 (角度 = 從 y 軸往 z 軸偏轉)
                const dLen = Math.sqrt(span * span + braceH * braceH);
                const dAng = Math.atan2(span, braceH);
                const d1 = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, dLen, 6), matLightSteel);
                d1.position.set(rx, COL_H - braceH / 2, mid);
                d1.rotation.x = dAng; scene.add(d1);
                const d2 = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, dLen, 6), matLightSteel);
                d2.position.set(rx, COL_H - braceH / 2, mid);
                d2.rotation.x = -dAng; scene.add(d2);
            });
        });

        createRunwayBeam(100, -50);
        createRunwayBeam(100, 50);

        // 護欄 (軌道樑外側，接在柱子翼板邊緣)
        function createRailing(x, z1, z2) {
            const len = z2 - z1;
            const mid = (z1 + z2) / 2;
            const ry = RUNWAY_Y + 2;
            const top = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, len, 6), matYellow);
            top.rotation.x = Math.PI / 2; top.position.set(x, ry, mid); scene.add(top);
            const mid2 = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, len, 6), matYellow);
            mid2.rotation.x = Math.PI / 2; mid2.position.set(x, ry - 0.5, mid); scene.add(mid2);
            for (let z = z1; z <= z2; z += 5) {
                const p = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.2, 6), matYellow);
                p.position.set(x, ry - 0.6, z); scene.add(p);
            }
        }
        createRailing(-50.8, -45, 45);
        createRailing(50.8, -45, 45);

        // === 雙箱型大樑 ===
        // bridgeGroup local: y=0 = 輪底(世界 RAIL_SURFACE)
        const bridgeGroup = new THREE.Group();

        function createBoxGirder(length, height, width, zOff, yBot) {
            const g = new THREE.Group();
            const yMid = yBot + height / 2;
            const top = new THREE.Mesh(new THREE.BoxGeometry(length, 0.2, width), matYellow);
            top.position.set(0, yBot + height, zOff); top.castShadow = true; g.add(top);
            const bot = new THREE.Mesh(new THREE.BoxGeometry(length, 0.2, width), matYellow);
            bot.position.set(0, yBot, zOff); bot.castShadow = true; g.add(bot);
            [-1, 1].forEach(s => {
                const w = new THREE.Mesh(new THREE.BoxGeometry(length, height, 0.15), matYellowBright);
                w.position.set(0, yMid, zOff + s * (width / 2 - 0.075)); w.castShadow = true; g.add(w);
            });
            for (let rx = -length / 2 + 6; rx < length / 2; rx += 6) {
                const rib = new THREE.Mesh(new THREE.BoxGeometry(0.08, height * 0.85, width * 0.85), matYellow);
                rib.position.set(rx, yMid, zOff); g.add(rib);
            }
            return g;
        }

        bridgeGroup.add(createBoxGirder(GIRDER_SPAN, GIRDER_H, GIRDER_W, -GIRDER_SPACING / 2, GIRDER_BOT));
        bridgeGroup.add(createBoxGirder(GIRDER_SPAN, GIRDER_H, GIRDER_W, GIRDER_SPACING / 2, GIRDER_BOT));

        // 端樑 (end truck) — 輪子在 local y≈0, 車體往上到 GIRDER_BOT
        [-1, 1].forEach(side => {
            const ex = side * GIRDER_SPAN / 2;
            // 端樑車體
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, END_TRUCK_H - 0.4, 11), matDarkSteel);
            body.position.set(ex, END_TRUCK_H / 2 + 0.2, 0); body.castShadow = true; bridgeGroup.add(body);
            // 黃黑警示
            const warn = new THREE.Mesh(new THREE.BoxGeometry(2.55, 0.4, 11.05), matWarning);
            warn.position.set(ex, 0.4, 0); bridgeGroup.add(warn);
            // 輪子 (在軌面上)
            [-4.5, 4.5].forEach(wz => {
                const wh = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.5, 16), matDarkSteel);
                wh.rotation.x = Math.PI / 2; wh.position.set(ex, 0.4, wz); bridgeGroup.add(wh);
            });
            // 走行馬達
            const em = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.2, 12), matBlue);
            em.rotation.x = Math.PI / 2; em.position.set(ex, 0.8, 3.5); em.castShadow = true; bridgeGroup.add(em);
        });

        // 雙樑間橫撐
        for (let cx = -GIRDER_SPAN / 2 + 10; cx < GIRDER_SPAN / 2; cx += 15) {
            const cr = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.15, GIRDER_SPACING + GIRDER_W), matLightSteel);
            cr.position.set(cx, GIRDER_TOP + 0.08, 0); bridgeGroup.add(cr);
        }

        // 走道 (樑頂外側)
        const walkway = new THREE.Mesh(new THREE.BoxGeometry(GIRDER_SPAN, 0.08, 1.5), matLightSteel);
        walkway.position.set(0, GIRDER_TOP + 0.05, GIRDER_SPACING / 2 + GIRDER_W / 2 + 0.8);
        walkway.receiveShadow = true; bridgeGroup.add(walkway);
        // 走道護欄
        [1.1, 0.5].forEach((h, i) => {
            const wr = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, GIRDER_SPAN, 8), matYellow);
            wr.rotation.z = Math.PI / 2;
            wr.position.set(0, GIRDER_TOP + h, GIRDER_SPACING / 2 + GIRDER_W / 2 + 1.5);
            bridgeGroup.add(wr);
        });

        scene.add(bridgeGroup);

        // === 小車 (trolley, local y=0 = 樑頂面) ===
        const trolleyGroup = new THREE.Group();
        const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 16);
        [[-2, 0.2, -GIRDER_SPACING / 2], [2, 0.2, -GIRDER_SPACING / 2],
         [-2, 0.2, GIRDER_SPACING / 2], [2, 0.2, GIRDER_SPACING / 2]].forEach(p => {
            const w = new THREE.Mesh(wheelGeo, matDarkSteel);
            w.rotation.x = Math.PI / 2; w.position.set(p[0], p[1], p[2]); trolleyGroup.add(w);
        });
        const trolleyFrame = new THREE.Mesh(new THREE.BoxGeometry(5, 0.8, GIRDER_SPACING + 2), matDarkSteel);
        trolleyFrame.position.y = 0.8; trolleyFrame.castShadow = true; trolleyGroup.add(trolleyFrame);
        const warningPanel = new THREE.Mesh(new THREE.BoxGeometry(5.05, 0.3, GIRDER_SPACING + 2.05), matWarning);
        warningPanel.position.y = 0.35; trolleyGroup.add(warningPanel);
        // 捲揚機 (穿過樑頂掛在雙樑之間)
        const drum = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 3, 16), matLightSteel);
        drum.rotation.z = Math.PI / 2; drum.position.set(0, -GIRDER_H / 2, 0); drum.castShadow = true; trolleyGroup.add(drum);
        const motor = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.5, 12), matBlue);
        motor.rotation.z = Math.PI / 2; motor.position.set(-1.5, 1.2, GIRDER_SPACING / 2 + 0.5); motor.castShadow = true; trolleyGroup.add(motor);
        scene.add(trolleyGroup);

        // === 鋼索 (雙線) ===
        const cableGeo = new THREE.CylinderGeometry(0.03, 0.03, 1, 8);
        cableGeo.translate(0, 0.5, 0);
        const cable1 = new THREE.Mesh(cableGeo, matCable);
        const cable2 = new THREE.Mesh(cableGeo, matCable);
        scene.add(cable1);
        scene.add(cable2);

        // === 吊鉤組件 ===
        const payloadGroup = new THREE.Group();

        // 滑車 (sheave block)
        const sheaveBlock = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.8, 1.2), matDarkSteel);
        sheaveBlock.position.y = 1.0;
        sheaveBlock.castShadow = true;
        payloadGroup.add(sheaveBlock);

        // 滑輪
        const sheave = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.1, 8, 16), matLightSteel);
        sheave.position.y = 1.0;
        sheave.rotation.y = Math.PI / 2;
        payloadGroup.add(sheave);

        // 吊鉤桿
        const hookShaft = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6, 8), matDarkSteel);
        hookShaft.position.y = 0.3;
        payloadGroup.add(hookShaft);

        // 吊鉤 (用 TorusGeometry 做彎鉤)
        const hookCurve = new THREE.Mesh(
            new THREE.TorusGeometry(0.3, 0.08, 8, 16, Math.PI * 1.3),
            matRed
        );
        hookCurve.position.y = -0.1;
        hookCurve.rotation.x = Math.PI / 2;
        hookCurve.rotation.z = -Math.PI * 0.15;
        hookCurve.castShadow = true;
        payloadGroup.add(hookCurve);

        // 安全閂
        const latch = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5, 6), matOrange);
        latch.position.set(0.15, -0.25, 0);
        latch.rotation.z = -0.5;
        payloadGroup.add(latch);

        // 吊掛重物 (藍色圓柱)
        const loadMesh = new THREE.Mesh(
            new THREE.CylinderGeometry(0.8, 0.8, 1.2, 32),
            matBlue
        );
        loadMesh.position.y = 0.0;
        loadMesh.castShadow = true;
        payloadGroup.add(loadMesh);

        scene.add(payloadGroup);

        // === 障礙物路線 ===
        function createCourse() {
            const pathPoints = [
                {x:-26,z:0}, {x:-16,z:-16}, {x:16,z:-16}, {x:26,z:0},
                {x:16,z:16}, {x:0,z:6}, {x:-16,z:16}, {x:-26,z:0}
            ].map(p => new THREE.Vector3(p.x, 0.05, p.z));

            // 虛線路徑
            const pathMat = new THREE.LineDashedMaterial({ color: '#3B82F6', dashSize: 1, gapSize: 0.5, linewidth: 1 });
            const pathGeo = new THREE.BufferGeometry().setFromPoints(pathPoints);
            const pathLine = new THREE.Line(pathGeo, pathMat);
            pathLine.computeLineDistances();
            scene.add(pathLine);

            // 障礙柱 (三角錐造型)
            const polePositions = [
                {x:-18,z:-18}, {x:-14,z:-14}, {x:18,z:-18}, {x:14,z:-14},
                {x:28,z:0}, {x:24,z:0}, {x:18,z:18}, {x:14,z:14},
                {x:2,z:8}, {x:-2,z:8}, {x:-18,z:18}, {x:-14,z:14},
                {x:-24,z:2}, {x:-24,z:-2}
            ];
            polePositions.forEach(p => {
                const poleGroup = new THREE.Group();
                // 柱身
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.25, 5, 8), matOrange);
                pole.position.y = 2.5;
                pole.castShadow = true;
                poleGroup.add(pole);
                // 反光條紋
                for (let s = 0; s < 3; s++) {
                    const stripe = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.18 - s * 0.02, 0.22 - s * 0.02, 0.3, 8),
                        new THREE.MeshStandardMaterial({ color: '#FFFFFF', metalness: 0.1, roughness: 0.3 })
                    );
                    stripe.position.y = 1.0 + s * 1.5;
                    poleGroup.add(stripe);
                }
                // 底座
                const poleBase = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.6, 0.2, 8), matDarkSteel);
                poleBase.position.y = 0.1;
                poleBase.receiveShadow = true;
                poleGroup.add(poleBase);

                poleGroup.position.set(p.x, 0, p.z);
                scene.add(poleGroup);
                obstacles.push(pole);
                pole.userData.group = poleGroup;
            });

            createHurdle(0, -16, 2.0, 6, false);
            createHurdle(-21, 8, 2.0, 6, false);
            createWall(0, 6);
        }

        function createHurdle(x, z, h, w, vert) {
            // 橫桿
            const bar = new THREE.Mesh(
                new THREE.CylinderGeometry(0.1, 0.1, vert ? w : w, 8),
                matRed
            );
            bar.rotation.z = vert ? 0 : Math.PI / 2;
            bar.position.set(x, h, z);
            bar.castShadow = true;
            scene.add(bar);
            obstacles.push(bar);

            // 支撐腿
            const legGeo = new THREE.CylinderGeometry(0.08, 0.1, h, 8);
            const l1 = new THREE.Mesh(legGeo, matLightSteel);
            l1.position.set(vert ? x : x - w / 2, h / 2, vert ? z - w / 2 : z);
            l1.castShadow = true;
            scene.add(l1);
            const l2 = new THREE.Mesh(legGeo, matLightSteel);
            l2.position.set(vert ? x : x + w / 2, h / 2, vert ? z + w / 2 : z);
            l2.castShadow = true;
            scene.add(l2);
            obstacles.push(l1); obstacles.push(l2);

            // 腿底座
            [l1, l2].forEach(leg => {
                const legBase = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.08, 8), matDarkSteel);
                legBase.position.set(leg.position.x, 0.04, leg.position.z);
                scene.add(legBase);
            });
        }

        function createWall(x, z) {
            const wallMat = matRed;
            const p1 = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 5, 8), wallMat);
            p1.position.set(x - 1.5, 2.5, z); p1.castShadow = true; scene.add(p1); obstacles.push(p1);
            const p2 = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 5, 8), wallMat);
            p2.position.set(x + 1.5, 2.5, z); p2.castShadow = true; scene.add(p2); obstacles.push(p2);
            // 連接橫桿
            const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 3, 8), matRed);
            bar.rotation.z = Math.PI / 2;
            bar.position.set(x, 4.5, z);
            scene.add(bar);
        }

        createCourse();

        // === 核心邏輯 ===
        function updateVelocity(curr, target, accel, decel, dt) {
            if (target !== 0) {
                if (curr < target) return Math.min(target, curr + accel * dt);
                else return Math.max(target, curr - accel * dt);
            } else {
                if (curr > 0) return Math.max(0, curr - decel * dt);
                else if (curr < 0) return Math.min(0, curr + decel * dt);
                return 0;
            }
        }

        // === 視角控制 ===
        const camSpherical = new THREE.Spherical(25, Math.PI / 2 - 0.2, 0);
        const activePointers = {};
        let previousPointerPos = { x: 0, y: 0 };
        let previousPinchDist = -1;

        const pointerDownHandler = (e) => {
            activePointers[e.pointerId] = { x: e.clientX, y: e.clientY };
            if (Object.keys(activePointers).length === 1) {
                previousPointerPos = { x: e.clientX, y: e.clientY };
            }
        };
        const pointerMoveHandler = (e) => {
            if (!activePointers[e.pointerId]) return;
            activePointers[e.pointerId] = { x: e.clientX, y: e.clientY };
            const keys = Object.keys(activePointers);
            if (keys.length === 1) {
                const deltaX = e.clientX - previousPointerPos.x;
                const deltaY = e.clientY - previousPointerPos.y;
                camSpherical.theta -= deltaX * 0.005;
                camSpherical.phi -= deltaY * 0.005;
                camSpherical.phi = THREE.MathUtils.clamp(camSpherical.phi, 0.1, Math.PI / 2 - 0.05);
                previousPointerPos = { x: e.clientX, y: e.clientY };
                previousPinchDist = -1;
            } else if (keys.length === 2) {
                const p1 = activePointers[keys[0]];
                const p2 = activePointers[keys[1]];
                const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
                if (previousPinchDist > 0) {
                    camSpherical.radius -= (dist - previousPinchDist) * 0.05;
                    camSpherical.radius = THREE.MathUtils.clamp(camSpherical.radius, 10, 80);
                }
                previousPinchDist = dist;
                previousPointerPos = { x: e.clientX, y: e.clientY };
            }
        };
        const pointerUpHandler = (e) => {
            delete activePointers[e.pointerId];
            const keys = Object.keys(activePointers);
            if (keys.length < 2) previousPinchDist = -1;
            if (keys.length === 1) previousPointerPos = { x: activePointers[keys[0]].x, y: activePointers[keys[0]].y };
        };

        const canvasEl = renderer.domElement;
        canvasEl.addEventListener('pointerdown', pointerDownHandler);
        canvasEl.addEventListener('pointermove', pointerMoveHandler);
        canvasEl.addEventListener('pointerup', pointerUpHandler);
        canvasEl.addEventListener('pointercancel', pointerUpHandler);
        canvasEl.addEventListener('pointerleave', pointerUpHandler);
        canvasEl.addEventListener('wheel', (e) => {
            e.preventDefault();
            camSpherical.radius += e.deltaY * 0.05;
            camSpherical.radius = THREE.MathUtils.clamp(camSpherical.radius, 10, 80);
        }, { passive: false });

        // === 動畫迴圈 ===
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);

            let tgB = 0, tgT = 0, tgH = 0;
            if (state.move.north) tgB = -REAL_SPEEDS.bridge;
            if (state.move.south) tgB = REAL_SPEEDS.bridge;
            if (state.move.west) tgT = -REAL_SPEEDS.trolley;
            if (state.move.east) tgT = REAL_SPEEDS.trolley;
            if (state.move.up) tgH = -REAL_SPEEDS.hoist;
            if (state.move.down) tgH = REAL_SPEEDS.hoist;

            state.velocity.bridge = updateVelocity(state.velocity.bridge, tgB, state.physics.accel.bridge, state.physics.decel.bridge, dt);
            state.velocity.trolley = updateVelocity(state.velocity.trolley, tgT, state.physics.accel.trolley, state.physics.decel.trolley, dt);
            state.velocity.hoist = updateVelocity(state.velocity.hoist, tgH, state.physics.accel.hoist, state.physics.decel.hoist, dt);

            state.bridgeZ += state.velocity.bridge * dt;
            state.trolleyX += state.velocity.trolley * dt;
            state.cableLength += state.velocity.hoist * dt;

            if (state.bridgeZ < -state.limits.z || state.bridgeZ > state.limits.z) {
                state.bridgeZ = THREE.MathUtils.clamp(state.bridgeZ, -state.limits.z, state.limits.z);
                state.velocity.bridge = 0;
            }
            if (state.trolleyX < -state.limits.x || state.trolleyX > state.limits.x) {
                state.trolleyX = THREE.MathUtils.clamp(state.trolleyX, -state.limits.x, state.limits.x);
                state.velocity.trolley = 0;
            }
            state.cableLength = THREE.MathUtils.clamp(state.cableLength, state.limits.minL, state.limits.maxL);

            // 更新大樑 (local y=0 = 輪底, 世界 y = RAIL_SURFACE)
            bridgeGroup.position.set(0, RAIL_SURFACE, state.bridgeZ);

            // 更新小車 (local y=0 = 樑頂, 世界 y = RAIL_SURFACE + GIRDER_TOP)
            trolleyGroup.position.set(state.trolleyX, RAIL_SURFACE + GIRDER_TOP, state.bridgeZ);

            // 物理 pivot = 樑底出線口
            const pivot = new THREE.Vector3(state.trolleyX, PIVOT_WORLD_Y, state.bridgeZ);
            let temp = payloadPos.clone();
            let vel = payloadPos.clone().sub(payloadPrevPos).multiplyScalar(DAMPING);
            let next = payloadPos.clone().add(vel).add(gravity.clone().multiplyScalar(dt * dt));

            let diff = next.clone().sub(pivot);
            let dist = diff.length();
            if (dist > 0.0001) {
                diff.multiplyScalar(state.cableLength / dist);
                next = pivot.clone().add(diff);
            }
            if (next.y < 1.2) {
                next.y = 1.2;
                payloadPrevPos.x = THREE.MathUtils.lerp(payloadPrevPos.x, next.x, 0.2);
                payloadPrevPos.z = THREE.MathUtils.lerp(payloadPrevPos.z, next.z, 0.2);
            }
            payloadPrevPos.copy(temp);
            payloadPos.copy(next);
            payloadGroup.position.copy(payloadPos);

            // 更新雙鋼索
            const cableOffset = 0.3;
            [cable1, cable2].forEach((cable, i) => {
                const ox = i === 0 ? -cableOffset : cableOffset;
                const top = new THREE.Vector3(state.trolleyX + ox, PIVOT_WORLD_Y, state.bridgeZ);
                const bot = new THREE.Vector3(payloadPos.x + ox, payloadPos.y + 0.9, payloadPos.z);
                const cVec = new THREE.Vector3().subVectors(bot, top);
                cable.position.copy(top);
                cable.scale.set(1, cVec.length(), 1);
                if (cVec.length() > 0.001) {
                    cable.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), cVec.normalize());
                }
            });

            // 投影標記
            shadowMarker.position.x = payloadPos.x;
            shadowMarker.position.z = payloadPos.z;

            // 相機跟隨
            const currentCamOffset = new THREE.Vector3().setFromSpherical(camSpherical);
            const targetCamPos = payloadPos.clone().add(currentCamOffset);
            if (targetCamPos.y < 1.7) targetCamPos.y = 1.7;
            camera.position.lerp(targetCamPos, 0.1);
            camera.lookAt(payloadPos.x, payloadPos.y + 1, payloadPos.z);

            // 碰撞檢測
            const pBox = new THREE.Box3().setFromObject(payloadGroup);
            pBox.expandByScalar(-0.1);
            let hit = false;
            obstacles.forEach(o => {
                if (pBox.intersectsBox(new THREE.Box3().setFromObject(o))) {
                    hit = true;
                    if (!o.userData.hit) { o.userData.hit = true; o.material.emissive.setHex(0xff0000); }
                }
            });
            collisionFlash.style.borderWidth = hit ? '5px' : '0px';

            renderer.render(scene, camera);
        }

        function resetGame() {
            state.bridgeZ = 0; state.trolleyX = -26; state.cableLength = PIVOT_WORLD_Y - 0.6;
            state.velocity = { bridge: 0, trolley: 0, hoist: 0 };
            payloadPos.set(-26, 1.2, 0); payloadPrevPos.copy(payloadPos);
            obstacles.forEach(o => { o.userData.hit = false; o.material.emissive.setHex(0x000000); });
        }

        // 綁定操作
        function setMove(act, down) {
            state.move[act] = down;
            const el = document.getElementById('btn-' + act);
            if (el) down ? el.classList.add('active') : el.classList.remove('active');
        }
        ['north', 'south', 'east', 'west', 'up', 'down'].forEach(k => {
            const btn = document.getElementById('btn-' + k);
            if (!btn) return;
            const start = (e) => { e.preventDefault(); setMove(k, true); };
            const end = (e) => { e.preventDefault(); setMove(k, false); };
            btn.addEventListener('mousedown', start); btn.addEventListener('touchstart', start, { passive: false });
            btn.addEventListener('mouseup', end); btn.addEventListener('touchend', end);
            btn.addEventListener('mouseleave', end); btn.addEventListener('touchcancel', end);
        });

        resetGame();
        animate();
    </script>
</body>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>營建用升降機防墜安全器 3D 演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* 自定義滑桿樣式 */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #4b5563;
            border-radius: 2px;
        }
        input[type=range]:focus {
            outline: none;
        }
    </style>
</head>
<body>

    <!-- 3D 畫布 -->
    <div id="canvas-container"></div>

    <!-- 控制面板 UI -->
    <div class="absolute top-4 left-4 w-80 bg-gray-900/90 text-white p-5 rounded-xl shadow-2xl backdrop-blur-sm border border-gray-700 select-none">
        <h1 class="text-xl font-bold mb-4 text-blue-400 border-b border-gray-700 pb-2">防墜安全器作動演示</h1>
        
        <!-- 狀態顯示 -->
        <div class="mb-5 bg-gray-800 p-3 rounded-lg border border-gray-600">
            <div class="flex justify-between items-center mb-1">
                <span class="text-sm text-gray-400">當前狀態</span>
                <span id="status-badge" class="px-2 py-1 rounded text-xs font-bold bg-green-500/20 text-green-400 border border-green-500/50">🟢 正常運轉</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-sm text-gray-400">當前轉速 (RPM)</span>
                <span id="current-rpm-display" class="text-2xl font-mono text-white">0</span>
            </div>
        </div>

        <!-- 控制滑桿 -->
        <div class="space-y-4">
            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-sm text-gray-300">目標驅動轉速 (油門)</label>
                    <span id="target-rpm-val" class="text-sm font-mono text-blue-400">0</span>
                </div>
                <input type="range" id="target-rpm" min="0" max="150" value="0" class="w-full">
                <div class="text-xs text-gray-500 mt-1">控制馬達輸入的轉速</div>
            </div>

            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-sm text-gray-300">安全觸發設定值</label>
                    <span id="trip-rpm-val" class="text-sm font-mono text-yellow-400">100</span>
                </div>
                <input type="range" id="trip-rpm" min="50" max="140" value="100" class="w-full">
                <div class="text-xs text-gray-500 mt-1">超過此值將觸發離心鎖死機構</div>
            </div>
        </div>

        <!-- 控制按鈕 -->
        <div class="mt-6">
            <button id="btn-reset" class="w-full py-2 bg-gray-700 hover:bg-gray-600 active:bg-gray-800 text-white rounded-lg transition-colors font-semibold disabled:opacity-50 disabled:cursor-not-allowed">
                ⚙️ 系統復位 (Reset)
            </button>
        </div>

        <!-- 視角切換 -->
        <div class="mt-4 flex gap-2">
            <button id="btn-casing" class="flex-1 py-1.5 bg-gray-700 hover:bg-gray-600 text-xs text-white rounded transition-colors font-medium">
                👁️ 隱藏外殼
            </button>
            <button id="btn-cutaway" class="flex-1 py-1.5 bg-blue-600 hover:bg-blue-500 text-xs text-white rounded transition-colors font-medium">
                🔪 恢復煞車皮
            </button>
        </div>

        <div class="mt-4 text-xs text-gray-400 leading-relaxed">
            <p><strong>原理：</strong>離心塊超速甩出後卡住內圈錐形鼓，螺紋將旋轉力轉為強大的軸向推力，使錐形鼓瞬間擠入外圈的錐形來令片，達成極速鎖死剎停。</p>
            <p class="mt-1"><strong>操作：</strong>請嘗試將驅動轉速拉高，觀察離心滑塊向外甩出，以及錐形鼓如何被往前(向上)推進並瞬間剎住。</p>
        </div>
    </div>

    <script>
        // === 系統狀態與變數 ===
        const STATE = {
            NORMAL: 0,
            TRIGGERED: 1, // 剛觸發，開始煞車
            LOCKED: 2     // 完全煞停
        };
        
        let currentState = STATE.NORMAL;
        let currentSpeed = 0; // 實際轉速
        let targetSpeed = 0;  // 用戶設定目標轉速
        let tripSpeed = 100;  // 觸發閾值

        // DOM 元素
        const elTargetRpm = document.getElementById('target-rpm');
        const elTargetRpmVal = document.getElementById('target-rpm-val');
        const elTripRpm = document.getElementById('trip-rpm');
        const elTripRpmVal = document.getElementById('trip-rpm-val');
        const elCurrentRpmDisplay = document.getElementById('current-rpm-display');
        const elStatusBadge = document.getElementById('status-badge');
        const btnReset = document.getElementById('btn-reset');
        const btnCasing = document.getElementById('btn-casing');
        const btnCutaway = document.getElementById('btn-cutaway');

        // === Three.js 初始化 ===
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x1a1a1a, 10, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15); // 調整視角以適應直立擺放

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 1.5;
        controls.minDistance = 5;
        controls.maxDistance = 20;
        controls.target.set(0, 1, 0); // 讓視角中心稍微向上

        // === 燈光 ===
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 15, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0x3b82f6, 1, 10);
        pointLight.position.set(0, 5, 5);
        scene.add(pointLight);

        // 底部補光燈，照亮底部齒輪
        const bottomLight = new THREE.DirectionalLight(0xffffff, 0.7);
        bottomLight.position.set(0, -10, 5);
        scene.add(bottomLight);

        // === 建立 3D 模型 (離心煞車機構) ===
        const mechanismGroup = new THREE.Group();
        scene.add(mechanismGroup);

        // 材質定義
        const matSteel = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.4 });
        const matShaft = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.8, roughness: 0.3 }); // 調亮主軸顏色避免全黑
        const matWeight = new THREE.MeshStandardMaterial({ color: 0xeab308, metalness: 0.5, roughness: 0.5 }); // 黃色離心塊
        const matInnerDrum = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.7, roughness: 0.5, side: THREE.DoubleSide }); // 白色/銀色內錐
        const matOuterBrake = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.2, roughness: 0.9, side: THREE.DoubleSide }); // 黑色來令片
        const matBrakeRed = new THREE.MeshStandardMaterial({ color: 0xef4444, metalness: 0.5, roughness: 0.8, emissive: 0xaa0000 }); // 觸發時的警示紅
        
        // 透明橘色外殼材質
        const matCasing = new THREE.MeshPhysicalMaterial({ 
            color: 0xd97725, 
            metalness: 0.1, 
            roughness: 0.1, 
            transparent: true, 
            opacity: 0.45, 
            transmission: 0.5,
            side: THREE.DoubleSide
        });

        // 將機構改為「直立式」 (Y軸向上)
        
        // 1. 中心主軸
        const shaftGeo = new THREE.CylinderGeometry(0.3, 0.3, 4, 32); // 縮短長度為4
        const shaft = new THREE.Mesh(shaftGeo, matShaft);
        shaft.position.y = 0.5; // 稍微往上提
        shaft.castShadow = true;
        mechanismGroup.add(shaft);

        // 底部小齒輪 (Pinion gear，與施工架齒條咬合)
        const pinionGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.8, 14);
        const pinion = new THREE.Mesh(pinionGeo, matShaft);
        pinion.position.y = -1.05; // 緊貼著法蘭盤下方
        mechanismGroup.add(pinion);

        // 2. 轉子底盤 (承載擺片)
        const rotorGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.4, 32);
        const rotor = new THREE.Mesh(rotorGeo, matSteel);
        rotor.position.y = 0.2;
        rotor.castShadow = true;

        // 將轉子與主軸、齒輪組合到一個旋轉群組
        const rotatingAssembly = new THREE.Group();
        rotatingAssembly.add(shaft);
        rotatingAssembly.add(pinion);
        rotatingAssembly.add(rotor);
        mechanismGroup.add(rotatingAssembly);

        // 3. 離心塊 (Sliding Weights) - 恢復為水平滑出設計
        const weights = [];
        const maxExtension = 0.55; // 最大向外滑動距離

        for (let i = 0; i < 2; i++) {
            const weightGroup = new THREE.Group();
            weightGroup.rotation.y = i * Math.PI; // 0 和 180度
            
            // 離心塊本體
            const weightGeo = new THREE.BoxGeometry(0.7, 0.4, 0.6);
            const weight = new THREE.Mesh(weightGeo, matWeight);
            weight.position.set(0.6, 0.4, 0); // 初始位置
            weight.castShadow = true;

            // 彈簧 (連接主軸與離心塊)
            const springGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.6, 8);
            const spring = new THREE.Mesh(springGeo, matSteel);
            spring.rotation.z = Math.PI / 2;
            spring.position.set(0.25, 0.4, 0);

            weightGroup.add(weight);
            weightGroup.add(spring);
            
            rotatingAssembly.add(weightGroup);
            
            weights.push({
                mesh: weight,
                spring: spring,
                baseX: 0.6
            });
        }

        // 4. 內圈螺紋錐形鼓 (Inner Conical Drum) - 白/銀色
        // 觸發時會被帶動旋轉，並沿著螺紋往 Y 軸正向(上方)推進
        const innerDrumGroup = new THREE.Group();
        innerDrumGroup.position.y = 0.5; // 初始高度
        mechanismGroup.add(innerDrumGroup);

        // 錐形外觀 (上窄下寬)
        const innerDrumGeo = new THREE.CylinderGeometry(1.5, 2.2, 1.2, 32, 1, true);
        const innerDrum = new THREE.Mesh(innerDrumGeo, matInnerDrum);
        innerDrumGroup.add(innerDrum);

        // 內圈齒 (讓離心塊卡入的地方)
        const teethGeo = new THREE.BoxGeometry(0.2, 0.4, 0.2);
        for(let i=0; i<12; i++) {
            const tooth = new THREE.Mesh(teethGeo, matSteel);
            const angle = (i / 12) * Math.PI * 2;
            tooth.position.set(Math.cos(angle) * 1.8, -0.4, Math.sin(angle) * 1.8);
            tooth.rotation.y = -angle;
            innerDrumGroup.add(tooth);
        }

        // 5. 外圈錐形來令片 (Outer Conical Brake Pad) - 黑色固定
        // 固定在機構內部，內錐形鼓推進時會緊緊卡死在這裡
        const outerBrakeGroup = new THREE.Group();
        outerBrakeGroup.position.y = 1.0; // 位置略高於內錐，保留推進空間
        mechanismGroup.add(outerBrakeGroup);

        const outerBrakeGeoFull = new THREE.CylinderGeometry(1.55, 2.25, 1.2, 32, 1, true);
        const outerBrakeGeoCut = new THREE.CylinderGeometry(1.55, 2.25, 1.2, 32, 1, true, 0, Math.PI * 1.5); // 切開 90 度剖面
        
        const outerBrake = new THREE.Mesh(outerBrakeGeoCut, matOuterBrake); // 預設使用剖面以利觀察
        outerBrakeGroup.add(outerBrake);

        // 5. 透明外殼 (Casing) - 仿照圖片外觀
        const casingGroup = new THREE.Group();
        mechanismGroup.add(casingGroup);

        // 底部法蘭盤 (Base Flange)
        const flangeGeo = new THREE.CylinderGeometry(2.8, 2.8, 0.3, 32);
        const flange = new THREE.Mesh(flangeGeo, matCasing);
        flange.position.y = -0.5;
        casingGroup.add(flange);

        // 鐘罩主體 (Dome)
        const domeGeo = new THREE.CylinderGeometry(1.6, 2.6, 2.0, 32);
        const dome = new THREE.Mesh(domeGeo, matCasing);
        dome.position.y = 0.65;
        casingGroup.add(dome);

        // 頂部圓柱 (Top Cylinder)
        const topCylGeo = new THREE.CylinderGeometry(1.2, 1.2, 1.5, 32);
        const topCyl = new THREE.Mesh(topCylGeo, matCasing);
        topCyl.position.y = 2.4;
        casingGroup.add(topCyl);

        // 側邊控制盒 (Side Box)
        const boxGeo = new THREE.BoxGeometry(1.0, 1.2, 0.8);
        const box = new THREE.Mesh(boxGeo, matCasing);
        box.position.set(1.2, 2.4, 0);
        casingGroup.add(box);

        // === UI 事件監聽 ===
        elTargetRpm.addEventListener('input', (e) => {
            if (currentState === STATE.NORMAL) {
                targetSpeed = parseInt(e.target.value);
                elTargetRpmVal.innerText = targetSpeed;
            } else {
                // 如果已經觸發煞車，不可調速，拉回 0
                e.target.value = 0;
            }
        });

        elTripRpm.addEventListener('input', (e) => {
            tripSpeed = parseInt(e.target.value);
            elTripRpmVal.innerText = tripSpeed;
        });

        // 視角控制：外殼隱藏與顯示
        let casingVisible = true;
        btnCasing.addEventListener('click', () => {
            casingVisible = !casingVisible;
            casingGroup.visible = casingVisible;
            btnCasing.innerText = casingVisible ? "👁️ 隱藏外殼" : "👁️ 顯示外殼";
            if(casingVisible) {
                btnCasing.classList.add('bg-gray-700'); btnCasing.classList.remove('bg-blue-600');
            } else {
                btnCasing.classList.add('bg-blue-600'); btnCasing.classList.remove('bg-gray-700');
            }
        });

        // 視角控制：外煞車皮剖面切換
        let cutawayActive = true;
        btnCutaway.addEventListener('click', () => {
            cutawayActive = !cutawayActive;
            outerBrake.geometry = cutawayActive ? outerBrakeGeoCut : outerBrakeGeoFull;
            btnCutaway.innerText = cutawayActive ? "🔪 恢復煞車皮" : "🔪 煞車皮剖面";
            if(cutawayActive) {
                btnCutaway.classList.add('bg-blue-600'); btnCutaway.classList.remove('bg-gray-700');
            } else {
                btnCutaway.classList.add('bg-gray-700'); btnCutaway.classList.remove('bg-blue-600');
            }
        });

        btnReset.addEventListener('click', () => {
            // 系統復位
            currentState = STATE.NORMAL;
            currentSpeed = 0;
            targetSpeed = 0;
            elTargetRpm.value = 0;
            elTargetRpmVal.innerText = "0";
            
            // 恢復視覺與位置
            innerDrum.material = matInnerDrum;
            weights.forEach(w => w.mesh.material.color.setHex(0xeab308)); // 變回黃色
            
            // 錐形鼓復位 (退回螺紋)
            innerDrumGroup.position.y = 0.5;
            innerDrumGroup.rotation.y = 0;

            updateStatusUI();
        });

        function updateStatusUI() {
            if (currentState === STATE.NORMAL) {
                elStatusBadge.className = "px-2 py-1 rounded text-xs font-bold bg-green-500/20 text-green-400 border border-green-500/50";
                elStatusBadge.innerText = "🟢 正常運轉";
                btnReset.disabled = true;
            } else if (currentState === STATE.TRIGGERED) {
                elStatusBadge.className = "px-2 py-1 rounded text-xs font-bold bg-yellow-500/20 text-yellow-400 border border-yellow-500/50 animate-pulse";
                elStatusBadge.innerText = "⚠️ 觸發煞車中";
                btnReset.disabled = true;
            } else if (currentState === STATE.LOCKED) {
                elStatusBadge.className = "px-2 py-1 rounded text-xs font-bold bg-red-500/20 text-red-400 border border-red-500/50";
                elStatusBadge.innerText = "🛑 安全鎖死";
                btnReset.disabled = false;
            }
        }

        // 初始化狀態
        updateStatusUI();

        // === 動畫與物理循環 ===
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 1. 轉速與狀態邏輯更新
            if (currentState === STATE.NORMAL) {
                // 平滑加速/減速至目標轉速 (模擬馬達慣性)
                const acceleration = 30.0; 
                if (currentSpeed < targetSpeed) {
                    currentSpeed += acceleration * delta;
                    if (currentSpeed > targetSpeed) currentSpeed = targetSpeed;
                } else if (currentSpeed > targetSpeed) {
                    currentSpeed -= acceleration * delta;
                    if (currentSpeed < targetSpeed) currentSpeed = targetSpeed;
                }

                // 檢查是否超過觸發轉速
                if (currentSpeed >= tripSpeed) {
                    currentState = STATE.TRIGGERED;
                    targetSpeed = 0; // 切斷動力
                    elTargetRpm.value = 0;
                    elTargetRpmVal.innerText = "0";
                    
                    // 視覺反饋：變紅
                    innerDrum.material = matBrakeRed;
                    weights.forEach(w => w.mesh.material.color.setHex(0xff3333));
                    updateStatusUI();
                }

            } else if (currentState === STATE.TRIGGERED) {
                // 幾乎瞬間鎖死: 給予極大減速力
                const brakingForce = 1200.0; // 非常快幾乎瞬間剎住
                currentSpeed -= brakingForce * delta;
                
                // 螺紋帶動邏輯: 內錐形鼓跟著主軸旋轉，並順著螺紋向前(上)推進
                const radPerSec = (currentSpeed * Math.PI * 2) / 60;
                innerDrumGroup.rotation.y -= radPerSec * delta; 
                
                // 向上擠壓至來令片 (模擬螺紋間距轉換的位移)
                innerDrumGroup.position.y += Math.abs(radPerSec) * delta * 0.15; 
                
                // 最大推進距離 (死鎖位置)
                const maxWedgeY = 1.0; 
                if (innerDrumGroup.position.y >= maxWedgeY) {
                    innerDrumGroup.position.y = maxWedgeY;
                    currentSpeed = 0; // 撞到頂死瞬間轉速歸零
                }

                if (currentSpeed <= 0) {
                    currentSpeed = 0;
                    currentState = STATE.LOCKED;
                    updateStatusUI();
                }
            }

            // 更新轉速顯示器 (做點抖動效果感覺更真實)
            let displayRpm = Math.max(0, Math.round(currentSpeed + (currentSpeed > 0 ? (Math.random()*2-1) : 0)));
            elCurrentRpmDisplay.innerText = displayRpm;

            // 2. 3D 視覺更新
            
            // 旋轉主軸
            // RPM 轉換為 Rad/s: (RPM * 2PI) / 60
            const radPerSec = (currentSpeed * Math.PI * 2) / 60;
            rotatingAssembly.rotation.y -= radPerSec * delta; // 逆時針旋轉

            // 離心塊水平向外滑出的距離 (隨轉速平方成正比)
            let normalizedSpeed = currentSpeed / tripSpeed;
            if (currentState !== STATE.NORMAL) {
                normalizedSpeed = 1.0; // 觸發後保持在最外側卡住
            }
            
            // 計算伸出量
            let extension = Math.pow(normalizedSpeed, 2) * maxExtension;
            if (extension > maxExtension) extension = maxExtension;

            // 更新每個離心塊與彈簧的位置
            weights.forEach(w => {
                const targetX = w.baseX + extension;
                w.mesh.position.x += (targetX - w.mesh.position.x) * 15 * delta;
                
                // 拉伸彈簧視覺
                w.spring.scale.y = 1 + extension * 1.5;
                w.spring.position.x = 0.25 + extension / 2;
            });

            // 攝影機微震動效果 (轉速快時)
            if (currentSpeed > 50 && currentState === STATE.NORMAL) {
                const shake = (currentSpeed / 150) * 0.02;
                camera.position.x += (Math.random() - 0.5) * shake;
                camera.position.y += (Math.random() - 0.5) * shake;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // 視窗縮放適應
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 啟動動畫
        animate();

    </script>
</body>
</html>
